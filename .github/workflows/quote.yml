name: Update Coding Quote

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run quote updater
        run: python quote.py

      - name: Commit and push
        run: |
          git config user.name "prnvmishra"
          git config user.email "pvmishra2004@gmail.com"
          git add README.md
          git diff --staged --quiet || git commit -m "✨ Daily quote updated"
          git push
